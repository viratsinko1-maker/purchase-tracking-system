# =============================================================================
# Nginx Reverse Proxy — PR/PO Tracking System
# TMK Palm Oil — Production (192.168.1.7)
#
# Proxy → app container port 2025
# Listen: port 80 (HTTP) + port 2026 (alternative)
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ─── Upstream (app service on port 2025) ─────────────────────────────
    upstream prpo_app {
        server app:2025;
    }

    # ─── Logging ─────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── General Settings ────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ─── Server Block (port 80) ──────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Next.js static assets (long cache)
        location /_next/static/ {
            proxy_pass http://prpo_app;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Public static files
        location /public/ {
            proxy_pass http://prpo_app;
            proxy_cache_valid 200 30d;
        }

        # API & tRPC
        location /api/ {
            proxy_pass http://prpo_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Everything else → Next.js
        location / {
            proxy_pass http://prpo_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Server Block (port 2026 — alternative access) ───────────────────
    server {
        listen 2026;
        server_name _;

        client_max_body_size 50M;

        location / {
            proxy_pass http://prpo_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }
}
