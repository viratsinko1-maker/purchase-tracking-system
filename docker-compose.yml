# =============================================================================
# Docker Compose — PR/PO Tracking System
# TMK Palm Oil — Production (192.168.1.7)
#
# Usage: docker compose up -d --build
# Access: http://192.168.1.7 (port 80) or http://192.168.1.7:2026
# =============================================================================

services:

  # ─── PostgreSQL Database ────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: prpo-postgres
    restart: unless-stopped
    cpus: "4"
    mem_limit: 8g
    environment:
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: "@12345"
      POSTGRES_DB: PR_PO
      TZ: Asia/Bangkok
    volumes:
      - D:\www\docker-data\postgres:/var/lib/postgresql/data
      - D:\www\docker-data\postgres-backup:/backups
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d PR_PO"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # ─── PR/PO Tracking App (Custom server.ts + schedulers) ────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prpo-app
    restart: unless-stopped
    cpus: "4"
    mem_limit: 2g
    env_file:
      - .env.production
    environment:
      DATABASE_URL: "postgresql://sa:@12345@postgres:5432/PR_PO?connection_limit=60&pool_timeout=30"
      NODE_ENV: production
      PORT: "2025"
      UPLOAD_DIR: /app/uploads
      TZ: Asia/Bangkok
    volumes:
      - D:\www\uploads\project01:/app/uploads
      - D:\www\logs\project01:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: prpo-nginx
    restart: unless-stopped
    cpus: "1"
    mem_limit: 512m
    ports:
      - "80:80"
      - "2026:2026"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge