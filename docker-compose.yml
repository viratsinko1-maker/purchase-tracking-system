services:
  # ─── PR/PO Tracking App ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prpo-app
    restart: unless-stopped
    cpus: "4"
    mem_limit: 2g
    env_file:
      - .env.production
    environment:
      # เชื่อมต่อกับ Postgres ตัวหลักในโปรเจกต์ Project01
      DATABASE_URL: "postgresql://sa:%40Tmk963*@project01-postgres:5432/PR_PO?connection_limit=60"
      NODE_ENV: production
      PORT: "2025"
      UPLOAD_DIR: /app/uploads
      TZ: Asia/Bangkok
    volumes:
      - D:\www\uploads\prpo:/app/uploads
      - D:\www\logs\prpo-app:/app/logs
      - sap_attachments:/app/sap-attachments:ro
    networks:
      - app-network
      - tmk-shared-network

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: prpo-nginx
    restart: unless-stopped
    cpus: "1"
    mem_limit: 512m
    ports:
      # เข้าใช้งานผ่าน http://192.168.1.7:2025
      - "2025:80"
      #- "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network
      - tmk-shared-network

networks:
  app-network:
    driver: bridge
  tmk-shared-network:
    external: true
    # ─── Volume Configuration (เพิ่มส่วนนี้) ──────────────────────────────────────
volumes:
  sap_attachments:
    driver: local
    driver_opts:
      type: cifs
      # ใช้เครื่องหมาย / แทน \ สำหรับที่อยู่ไอพี
      device: "//10.1.1.199/b1_shr"
      # ใส่ username (xxx) และ password (yyy) ของคุณตรงนี้
      # vers=3.0 คือมาตรฐานความปลอดภัยปัจจุบัน, ro คืออ่านอย่างเดียว
      o: "username=B1admin,password=On33rp,vers=3.0,ro"